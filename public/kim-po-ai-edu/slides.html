    .topbar { height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 20px; background: rgba(255,255,255,.96); color: #172033; border-bottom: 1px solid #e6eaf2; }

    .viewer { width: 100%; height: calc(100vh - 64px); background: #111827; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #111827; }
    .fallback { display: none; padding: 30px; text-align: center; line-height: 1.7; }
    @media (max-width: 640px) {
      .topbar { height: auto; min-height: 76px; align-items: flex-start; flex-direction: column; padding: 12px 14px; }
